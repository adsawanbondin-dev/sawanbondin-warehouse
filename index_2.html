<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sawanbondin — ระบบจัดการคลัง</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1c1c1e;--ink2:#48484a;--ink3:#8e8e93;--ink4:#aeaeb2;
  --bg:#f0f0ee;--surface:#fff;--s2:#f7f7f5;--s3:#eeeeec;
  --line:#e4e4e0;--line2:#d0d0c8;
  --acc:#2c5282;--acc-bg:#ebf0f8;--acc-mid:#4a7ab5;
  --grn:#2d6a4f;--grn-bg:#edf5f0;--grn-mid:#3d8b67;
  --amb:#7a4f1e;--amb-bg:#faf3ea;
  --red:#7a2020;--red-bg:#faf0f0;
  --blu:#1a4a72;--blu-bg:#e8f1f8;
  --warn:#854f0b;--warn-bg:#fef3e2;--warn-bdr:#f0c060;
  --r:6px;--rlg:10px;
}
body{font-family:'SF Pro Text','Helvetica Neue',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.topbar{background:#1a1a1c;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:46px;position:sticky;top:0;z-index:200}
.topbar-title{font-size:13px;font-weight:500}
.topbar-sub{color:#6e6e73;font-size:11px;padding-left:8px;border-left:1px solid #3a3a3c;margin-left:6px}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-date{font-size:11px;color:#6e6e73}
.alert-bell{position:relative;cursor:pointer;color:#6e6e73;padding:4px}
.alert-bell:hover{color:#fff}
.alert-dot{position:absolute;top:2px;right:2px;width:6px;height:6px;background:#e24b4a;border-radius:50%;border:2px solid #1a1a1c;display:none}
.topbar-link{font-size:11px;color:#6e6e73;text-decoration:none;display:flex;align-items:center;gap:4px;padding:4px 9px;border:1px solid #3a3a3c;border-radius:5px;transition:all .15s}
.topbar-link:hover{color:#fff;border-color:#6e6e73}

.nav{background:var(--surface);border-bottom:1px solid var(--line);display:flex;padding:0 12px;position:sticky;top:46px;z-index:190;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-item{padding:10px 12px;cursor:pointer;font-size:12px;color:var(--ink3);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:4px;flex-shrink:0}
.nav-item:hover{color:var(--ink2);background:var(--s2)}
.nav-item.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:500}

.main{padding:12px 14px;max-width:1200px;margin:0 auto}
.wh-layout{display:grid;grid-template-columns:340px 1fr;gap:12px;align-items:start}
@media(max-width:860px){.wh-layout{grid-template-columns:1fr}}
.wh-left,.wh-right{display:flex;flex-direction:column;gap:10px;min-width:0}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--rlg);padding:13px 15px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.page-title{font-size:15px;font-weight:500}
.page-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.page-actions{display:flex;align-items:center;gap:6px}

.qr-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;color:var(--ink2);transition:all .15s}
.qr-btn:hover{border-color:var(--acc-mid);color:var(--acc);background:var(--acc-bg)}
.cam-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;background:var(--grn);border:none;border-radius:var(--r);cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;color:#fff;transition:all .15s}
.cam-btn:hover{background:var(--grn-mid)}

/* Camera scanner */
.cam-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.cam-overlay.show{display:flex}
.cam-box{width:100%;max-width:400px;background:#000;border-radius:12px;overflow:hidden;position:relative}
#cam-reader{width:100%}
.cam-result{margin-top:12px;padding:10px 16px;border-radius:var(--r);font-size:13px;color:#fff;text-align:center;min-height:44px}
.cam-result.ok{background:rgba(45,106,79,.8)}
.cam-result.err{background:rgba(122,32,32,.8)}
.cam-close{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cam-controls{display:flex;gap:10px;margin-top:12px;align-items:center}
.cam-action-select,.cam-qty{padding:8px 10px;border:1px solid rgba(255,255,255,.3);border-radius:var(--r);background:rgba(255,255,255,.1);color:#fff;font-family:inherit;font-size:13px;outline:none}
.cam-qty{width:70px;text-align:center}
.cam-confirm{padding:8px 18px;background:var(--acc);border:none;border-radius:var(--r);color:#fff;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer}

/* Scan strip */
.scan-strip{background:var(--s2);border:1px solid var(--line);border-radius:var(--r);padding:9px 12px;margin-bottom:10px}
.scan-strip-title{font-size:10px;font-weight:600;color:var(--ink3);margin-bottom:6px;display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.4px}
.scan-strip-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.scan-strip-input{flex:1;min-width:120px;padding:7px 9px;border:1px solid var(--line2);border-radius:var(--r);font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface);outline:none}
.scan-strip-input:focus{border-color:var(--acc)}
.scan-strip-select{padding:7px 8px;border:1px solid var(--line);border-radius:var(--r);font-family:inherit;font-size:12px;color:var(--ink);background:var(--surface);outline:none;cursor:pointer}
.scan-strip-qty{width:62px;padding:7px 8px;border:1px solid var(--line);border-radius:var(--r);font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface);outline:none}
.scan-strip-btn{padding:7px 12px;background:var(--ink2);border:none;border-radius:var(--r);color:#fff;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.scan-strip-btn:hover{background:var(--ink)}
.scan-result{width:100%;margin-top:5px;padding:6px 9px;border-radius:var(--r);font-size:11px;display:none;line-height:1.4}
.scan-result.ok{display:block;background:var(--grn-bg);color:var(--grn);border:1px solid #b0d4c0}
.scan-result.err{display:block;background:var(--red-bg);color:var(--red);border:1px solid #e0b0b0}

.card-title{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title-left{display:flex;align-items:center;gap:6px}
.badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.badge-receive{background:var(--grn-bg);color:var(--grn)}
.badge-withdraw{background:var(--amb-bg);color:var(--amb)}
.badge-return-good{background:var(--blu-bg);color:var(--blu)}
.badge-return-bad{background:var(--red-bg);color:var(--red)}

.action-select-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.action-select-label{font-size:11px;color:var(--ink3);white-space:nowrap}
.action-select{padding:7px 28px 7px 10px;border:1px solid var(--line);border-radius:var(--r);font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;flex:1}
.action-select:focus{border-color:var(--acc)}
.action-select-icon{margin-left:-22px;pointer-events:none;color:var(--ink3);font-size:12px;flex-shrink:0}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-full{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.3px;text-transform:uppercase}
.fl .req{color:#c0392b;margin-left:2px}
.fi,.fs,.fta{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:var(--r);font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--acc)}
.fta{resize:vertical;min-height:52px;line-height:1.5}
.fhint{font-size:10px;color:var(--ink4)}
.divider{height:1px;background:var(--line);margin:10px 0}
.lot-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}

.item-wrap{position:relative}
.item-input{width:100%;padding:7px 28px 7px 9px;border:1px solid var(--line);border-radius:var(--r);font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s}
.item-input:focus{border-color:var(--acc)}
.item-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink3);padding:2px;font-size:11px}
.dd{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--surface);border:1px solid var(--line2);border-radius:var(--r);z-index:300;max-height:220px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.dd-search{padding:6px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface)}
.dd-search input{width:100%;padding:5px 8px;border:1px solid var(--line);border-radius:5px;font-family:inherit;font-size:11px;outline:none}
.dd-grp-label{padding:7px 10px 3px;font-size:9px;font-weight:600;color:var(--ink4);letter-spacing:.6px;text-transform:uppercase}
.dd-item{padding:6px 10px;cursor:pointer;font-size:12px;color:var(--ink);transition:background .1s;display:flex;align-items:center;gap:6px}
.dd-item:hover{background:var(--s2)}
.itag{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:500;flex-shrink:0}
.tag-pd{background:#ede8f8;color:#4a2d8a}
.tag-raw{background:var(--amb-bg);color:var(--amb)}
.tag-fw{background:var(--blu-bg);color:var(--blu)}
.tag-ll{background:var(--grn-bg);color:var(--grn)}
.dd-code{font-size:10px;color:var(--ink4);font-family:monospace;margin-left:auto}

.radio-grp{display:flex;gap:4px;flex-wrap:wrap}
.radio-opt{display:flex;align-items:center;gap:4px;cursor:pointer;padding:5px 9px;border:1px solid var(--line);border-radius:var(--r);font-size:12px;transition:all .15s;color:var(--ink2);user-select:none}
.radio-opt:hover{border-color:var(--line2);background:var(--s2)}
.radio-opt input{display:none}
.radio-opt.sel{border-color:var(--acc);background:var(--acc-bg);color:var(--acc);font-weight:500}
.dept-pill{display:inline-flex;align-items:center;font-size:10px;padding:2px 6px;border-radius:10px;font-weight:500}
.dept-prod{background:#e8f0e8;color:#2d5a2d}
.dept-ware{background:#e8eef8;color:#2d4a7a}
.dept-pack{background:#f0e8f8;color:#5a2d8a}
.dept-tea{background:#f8f0e0;color:#7a4f1e}

.btn{padding:7px 13px;border-radius:var(--r);border:1px solid var(--line);cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px;background:var(--surface);color:var(--ink2)}
.btn:hover{background:var(--s2);border-color:var(--line2)}
.btn-primary{background:var(--ink);border-color:var(--ink);color:#fff}
.btn-primary:hover{background:#2c2c2e}
.btn-sm{padding:4px 9px;font-size:11px}

.alert-bar{background:var(--warn-bg);border:1px solid var(--warn-bdr);border-radius:var(--r);padding:8px 11px;margin-bottom:10px;display:flex;align-items:flex-start;gap:8px}
.alert-bar i{color:var(--warn);font-size:13px;flex-shrink:0;margin-top:2px}
.alert-bar-title{font-size:11px;font-weight:500;color:var(--warn);margin-bottom:3px}
.alert-items{display:flex;flex-wrap:wrap;gap:4px}
.alert-chip{font-size:10px;padding:1px 6px;border-radius:4px;border:1px solid var(--warn-bdr);color:var(--warn);background:#fff5e0}

.hist-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.hist-table{width:100%;border-collapse:collapse;font-size:11px}
.hist-table th{text-align:left;padding:6px 8px;background:var(--s2);color:var(--ink3);font-weight:500;border-bottom:1px solid var(--line);font-size:10px;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap}
.hist-table td{padding:7px 8px;border-bottom:1px solid var(--line);color:var(--ink2);vertical-align:middle;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tr:hover td{background:var(--s2)}
.tbadge{padding:2px 6px;border-radius:3px;font-size:10px;font-weight:500;white-space:nowrap}
.empty{text-align:center;padding:24px;color:var(--ink3)}
.empty i{font-size:20px;display:block;margin-bottom:5px;opacity:.5}
.empty-text{font-size:12px}

/* Modals */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:500;display:none;align-items:center;justify-content:center;padding:14px}
.modal-wrap.show{display:flex}
.modal{background:var(--surface);border-radius:var(--rlg);padding:18px;max-width:440px;width:100%}
.modal-check{width:32px;height:32px;background:var(--grn-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 9px}
.modal-check i{font-size:16px;color:var(--grn)}
.modal-title{text-align:center;font-size:13px;font-weight:500;margin-bottom:3px}
.modal-sub{text-align:center;font-size:11px;color:var(--ink3);margin-bottom:12px;line-height:1.5}
.modal-actions{display:flex;justify-content:center;gap:8px}

/* QR Sidebar */
.qr-sidebar{position:fixed;inset:0;z-index:500;display:none;justify-content:flex-end}
.qr-sidebar.show{display:flex}
.qr-overlay{position:absolute;inset:0;background:rgba(0,0,0,.25)}
.qr-panel{position:relative;width:340px;max-width:90vw;background:var(--surface);height:100%;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.15);display:flex;flex-direction:column}
.qr-panel-header{padding:13px 15px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.qr-panel-title{font-size:13px;font-weight:500;color:var(--ink);display:flex;align-items:center;gap:7px}
.qr-panel-body{padding:13px 15px;flex:1}
.qr-action-form{background:var(--s2);border:1px solid var(--line);border-radius:var(--r);padding:11px;margin-bottom:13px}
.qr-action-title{font-size:10px;font-weight:600;color:var(--ink2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.qr-action-row{display:flex;flex-direction:column;gap:6px}
.qr-action-input{width:100%;padding:8px 10px;border:1.5px solid var(--acc-mid);border-radius:var(--r);font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface);outline:none}
.qr-action-input:focus{border-color:var(--acc)}
.qr-action-row2{display:flex;gap:6px}
.qr-action-select{flex:1;padding:7px 9px;border:1px solid var(--line);border-radius:var(--r);font-family:inherit;font-size:12px;color:var(--ink);background:var(--surface);outline:none;cursor:pointer}
.qr-action-qty{width:68px;padding:7px 8px;border:1px solid var(--line);border-radius:var(--r);font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface);outline:none}
.qr-action-btn{width:100%;padding:9px;background:var(--acc);border:none;border-radius:var(--r);color:#fff;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.qr-action-btn:hover{background:var(--blu)}
.qr-result{padding:7px 10px;border-radius:var(--r);font-size:11px;display:none;margin-top:4px}
.qr-result.ok{display:block;background:var(--grn-bg);color:var(--grn);border:1px solid #b0d4c0}
.qr-result.err{display:block;background:var(--red-bg);color:var(--red);border:1px solid #e0b0b0}
.qr-list-title{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.qr-list{display:flex;flex-direction:column;gap:10px}
.qr-list-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:var(--r);background:var(--surface)}
.qr-list-info{flex:1;min-width:0}
.qr-list-name{font-size:11px;font-weight:500;color:var(--ink);line-height:1.3;overflow-wrap:break-word;word-break:break-word}
.qr-list-code{font-size:10px;color:var(--acc);font-family:monospace;margin-top:2px}
.qr-list-stock{font-size:10px;color:var(--ink3);margin-top:2px}

/* Master */
.master-search-bar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.master-search-bar input{flex:1;min-width:130px;padding:7px 9px;border:1px solid var(--line);border-radius:var(--r);font-family:inherit;font-size:12px;outline:none;background:var(--surface)}
.master-search-bar input:focus{border-color:var(--acc)}
.cat-tabs{display:flex;gap:4px;flex-wrap:wrap}
.cat-tab{padding:4px 10px;border-radius:20px;border:1px solid var(--line);background:var(--surface);cursor:pointer;font-size:11px;font-weight:500;color:var(--ink3);transition:all .15s;white-space:nowrap}
.cat-tab:hover{border-color:var(--line2);color:var(--ink2)}
.cat-tab.active{background:var(--ink);border-color:var(--ink);color:#fff}
.master-section{margin-bottom:18px}
.master-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.master-section-title{font-size:11px;font-weight:600;color:var(--ink2);display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.4px}
.mcount{font-size:10px;padding:1px 5px;border-radius:8px;background:var(--s3);color:var(--ink3);font-weight:500}
.item-list{display:flex;flex-direction:column;gap:1px}
.item-row{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:9px 12px;display:flex;align-items:center;gap:10px;transition:border-color .15s}
.item-row:hover{border-color:var(--line2)}
.item-row.low-stock{border-left:3px solid var(--warn-bdr);background:var(--warn-bg)}
.item-row.out-stock{border-left:3px solid #e0b0b0;background:#fdf5f5}
.ir-main{flex:1;min-width:0}
.ir-name{font-size:12px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ir-code{font-size:10px;color:var(--acc);font-family:monospace;margin-top:1px}
.ir-meta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap}
.ir-stock{font-size:11px;color:var(--ink2)}
.ir-stock strong{color:var(--ink);font-weight:500}
.ir-minmax{font-size:10px;color:var(--ink4)}
.ir-si{display:inline-flex;align-items:center;gap:2px;font-size:10px;padding:1px 5px;border-radius:3px;font-weight:500}
.si-ok{background:var(--grn-bg);color:var(--grn)}
.si-low{background:var(--warn-bg);color:var(--warn)}
.si-out{background:var(--red-bg);color:var(--red)}
.stock-bar{height:3px;background:var(--line);border-radius:2px;overflow:hidden;flex-shrink:0}
.stock-bar-fill{height:100%;border-radius:2px}
.fill-ok{background:var(--grn-mid)}.fill-low{background:#e6a817}.fill-out{background:#e24b4a}
.ir-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--line);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink3);transition:all .15s}
.icon-btn:hover{border-color:var(--acc-mid);color:var(--acc);background:var(--acc-bg)}
.icon-btn i{font-size:13px}
.icon-btn.danger{color:var(--ink3)}
.icon-btn.danger:hover{border-color:#e0b0b0;color:var(--red);background:var(--red-bg)}

    masterDB.push({id:masterDB.length+1,code:genCodeRaw(g.cat),name,pg:'raw',subcat:g.cat,unit:'กก.',stock:0,min:0,max:0});
  }));
  // Matcha
  MATCHA_ITEMS.forEach(name=>{
    masterDB.push({id:masterDB.length+1,code:genCode('matcha'),name,pg:'matcha',subcat:'',unit:'กก.',stock:0,min:0,max:0});
  });
  // Pack
  Object.entries(PACK_CATS).forEach(([cat,items])=>items.forEach(name=>{
    masterDB.push({id:masterDB.length+1,code:genCode('pack'),name,pg:'pack',subcat:cat,unit:'ชิ้น',stock:0,min:0,max:0});
  }));
  // Equip
  Object.entries(EQUIP_CATS).forEach(([cat,items])=>items.forEach(name=>{
    masterDB.push({id:masterDB.length+1,code:genCode('equip'),name,pg:'equip',subcat:cat,unit:'ชิ้น',stock:0,min:0,max:0});
  }));
}
initMasterDB();

function pad(n){return String(n).padStart(2,'0')}
function tnow(){const d=new Date();return `${pad(d.getHours())}:${pad(d.getMinutes())}`}
function tday(){const d=new Date();const m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()+543}`}
document.getElementById('topbarDate').textContent=tday();
function getAlertItems(pg){return masterDB.filter(m=>{if(pg&&m.pg!==pg)return false;if(m.min<=0&&m.max<=0)return false;return m.stock<=m.min;});}
function checkAlerts(){const a=getAlertItems(null);const dot=document.getElementById('alertDot');if(dot)dot.style.display=a.length?'block':'none';}
function stockStatus(m){if(m.min<=0&&m.max<=0)return'ok';if(m.stock<=0)return'out';if(m.stock<=m.min)return'low';return'ok';}
function getDepts(pg){return pg==='raw'||pg==='matcha'?DEPT_RAW:DEPT_OTHER;}
function closeModal(id){document.getElementById(id).classList.remove('show');}

/* ══ SUPABASE FUNCTIONS ══ */
async function loadStockFromDB(){
  try{
    const{data,error}=await sb.from('items').select('code,stock,min_stock,max_stock');
    if(error||!data)return;
    data.forEach(row=>{const m=masterDB.find(x=>x.code===row.code);if(m){m.stock=parseFloat(row.stock)||0;m.min=parseFloat(row.min_stock)||0;m.max=parseFloat(row.max_stock)||0;}});
    checkAlerts();
  }catch(e){console.warn(e);}
}
async function upsertItem(m){
  try{await sb.from('items').upsert({code:m.code,name:m.name,pg:m.pg,subcat:m.subcat||'',unit:m.unit,stock:m.stock,min_stock:m.min,max_stock:m.max},{onConflict:'code'});}catch(e){console.warn(e);}
}
async function insertTransaction(rec){
  try{await sb.from('transactions').insert({item_code:rec.code,item_name:rec.item,pg:rec.pg,action_type:rec.type,quantity:rec.qty,unit:rec.unit,operator_name:rec.name,department:rec.dept,lot_sw:rec.lotSW||'',lot_supplier:rec.lotSP||'',note:rec.note||'',via:rec.via||'manual'});}catch(e){console.warn(e);}
}
async function loadTransactions(pg){
  try{
    const{data,error}=await sb.from('transactions').select('*').eq('pg',pg).order('created_at',{ascending:false}).limit(60);
    if(error||!data)return;
    ST[pg].records=data.map(r=>({time:new Date(r.created_at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}),_ts:new Date(r.created_at).getTime(),type:r.action_type,typeLabel:AL[r.action_type]||r.action_type,name:r.operator_name||'',dept:r.department||'',item:r.item_name,code:r.item_code,qty:parseFloat(r.quantity),unit:r.unit||'',lotSW:r.lot_sw||'-',pg:r.pg,via:r.via||'manual'}));
    renderHistory(pg);
  }catch(e){console.warn(e);}
}

/* ══ CAMERA SCANNER ══ */
function openCamera(pg){
  currentQRPage=pg;
  lastCamCode='';
  document.getElementById('camResult').textContent='พุ่งกล้องไปที่ QR หรือ Barcode';
  document.getElementById('camResult').style.background='';
  document.getElementById('camOverlay').classList.add('show');
  const config={fps:10,qrbox:{width:250,height:250},supportedScanTypes:[Html5QrcodeScanType.SCAN_TYPE_CAMERA]};
  camScanner=new Html5Qrcode('cam-reader');
  camScanner.start({facingMode:'environment'},config,onCamSuccess,onCamError).catch(e=>{document.getElementById('camResult').textContent='ไม่สามารถเปิดกล้องได้: '+e;});
}
function onCamSuccess(code){
  lastCamCode=code;
  const m=masterDB.find(x=>x.code.toLowerCase()===code.toLowerCase());
  const res=document.getElementById('camResult');
  if(m){res.style.background='rgba(45,106,79,.8)';res.textContent=`พบ: ${m.name} (${m.code}) · สต็อก ${m.stock} ${m.unit}`;}
  else{res.style.background='rgba(122,32,32,.8)';res.textContent=`ไม่พบรหัส "${code}" ในระบบ`;}
}
function onCamError(){}
async function confirmCamScan(){
  if(!lastCamCode){alert('ยังไม่ได้สแกนรหัส');return;}
  const action=document.getElementById('camAction').value;
  const qty=parseFloat(document.getElementById('camQty').value||1);
  if(!qty||qty<=0){alert('กรุณาระบุจำนวน');return;}
  const m=masterDB.find(x=>x.code.toLowerCase()===lastCamCode.toLowerCase());
  if(!m){alert('ไม่พบรหัสในระบบ');return;}
  if(action==='receive'||action==='return_good')m.stock+=qty;
  else if(action==='withdraw')m.stock=Math.max(0,m.stock-qty);
  await upsertItem(m);
  const pg=m.pg;
  const rec={time:tnow(),_ts:Date.now(),type:action,typeLabel:AL[action],name:'(กล้องสแกน)',dept:getDepts(pg)[0],item:m.name,code:m.code,qty,unit:m.unit,lotSW:'-',pg,via:'camera'};
  ST[pg].records.unshift(rec);
  await insertTransaction(rec);
  checkAlerts();
  if(currentQRPage===pg)renderHistory(pg);
  document.getElementById('camResult').style.background='rgba(45,106,79,.8)';
  document.getElementById('camResult').textContent=`${AL[action]} "${m.name}" ${qty} ${m.unit}${action==='return_bad'?' [ไม่หักสต็อก]':''} · สต็อก ${m.stock} ${m.unit}`;
  lastCamCode='';
  document.getElementById('camQty').value='1';
}
function closeCamera(){
  if(camScanner){camScanner.stop().catch(()=>{});camScanner=null;}
  document.getElementById('cam-reader').innerHTML='';
  document.getElementById('camOverlay').classList.remove('show');
  lastCamCode='';
}

/* ══ SCAN STRIP ══ */
function scanStripHtml(pg){
  return `<div class="scan-strip">
    <div class="scan-strip-title"><i class="ti ti-barcode" aria-hidden="true"></i> สแกน Barcode / QR</div>
    <div class="scan-strip-row">
      <input class="scan-strip-input" id="${pg}-sb" placeholder="รหัส เช่น ${PREFIX}-${PG_PREFIX[pg]}-0001" onkeydown="if(event.key==='Enter')doScan('${pg}')">
      <select class="scan-strip-select" id="${pg}-sa"><option value="receive">รับเข้า</option><option value="withdraw">เบิก</option><option value="return_good">คืนดี</option><option value="return_bad">คืนเสีย</option></select>
      <input class="scan-strip-qty" id="${pg}-sq" type="number" min="0.01" step="0.01" value="1">
      <button class="scan-strip-btn" onclick="doScan('${pg}')"><i class="ti ti-check" aria-hidden="true"></i> ยืนยัน</button>
    </div>
    <div class="scan-result" id="${pg}-sr"></div>
  </div>`;
}
async function doScan(pg){
  const code=(document.getElementById(pg+'-sb').value||'').trim();
  const action=document.getElementById(pg+'-sa').value;
  const qty=parseFloat(document.getElementById(pg+'-sq').value||1);
  const res=document.getElementById(pg+'-sr');
  if(!code){res.className='scan-result err';res.textContent='กรุณาสแกนหรือพิมพ์รหัสก่อน';setTimeout(()=>res.className='scan-result',2500);return;}
  const m=masterDB.find(x=>x.code.toLowerCase()===code.toLowerCase());
  if(!m){res.className='scan-result err';res.textContent=`ไม่พบรหัส "${code}"`;setTimeout(()=>res.className='scan-result',3000);return;}
  if(action==='receive'||action==='return_good')m.stock+=qty;
  else if(action==='withdraw')m.stock=Math.max(0,m.stock-qty);
  await upsertItem(m);
  const rec={time:tnow(),_ts:Date.now(),type:action,typeLabel:AL[action],name:'(สแกน)',dept:getDepts(pg)[0],item:m.name,code:m.code,qty,unit:m.unit,lotSW:'-',pg,via:'scan'};
  ST[pg].records.unshift(rec);await insertTransaction(rec);
  checkAlerts();renderHistory(pg);
  res.className='scan-result ok';res.textContent=`${AL[action]} "${m.name}" ${qty} ${m.unit}${action==='return_bad'?' [ไม่หักสต็อก]':''} · สต็อก ${m.stock} ${m.unit}`;
  document.getElementById(pg+'-sb').value='';document.getElementById(pg+'-sq').value='1';
  setTimeout(()=>res.className='scan-result',4000);
}

/* ══ QR SIDEBAR ══ */
function openQR(pg){currentQRPage=pg;document.getElementById('qrPanelTitle').textContent=`QR — ${PL[pg]}`;document.getElementById('qr-scan-input').value='';document.getElementById('qr-scan-qty').value='1';document.getElementById('qr-scan-result').className='qr-result';document.getElementById('qrSidebar').classList.add('show');buildQRList(pg);}
function closeQR(){document.getElementById('qrSidebar').classList.remove('show');currentQRPage=null;}
function buildQRList(pg){
  const list=document.getElementById('qrList');list.innerHTML='';
  masterDB.filter(m=>m.pg===pg).slice(0,50).forEach(m=>{
    const row=document.createElement('div');row.className='qr-list-item';
    const canvas=document.createElement('canvas');canvas.style.cssText='width:56px;height:56px;flex-shrink:0';
    const info=document.createElement('div');info.className='qr-list-info';
    const nm=document.createElement('div');nm.className='qr-list-name';nm.textContent=m.name;
    const cd=document.createElement('div');cd.className='qr-list-code';cd.textContent=m.code;
    const st=document.createElement('div');st.className='qr-list-stock';st.textContent=`สต็อก: ${m.stock} ${m.unit}`;
    info.appendChild(nm);info.appendChild(cd);info.appendChild(st);
    row.appendChild(canvas);row.appendChild(info);list.appendChild(row);
    try{new QRCode(canvas,{text:m.code,width:56,height:56,colorDark:'#1c1c1e',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});}catch(e){}
  });
}
async function doQRScan(){
  const code=(document.getElementById('qr-scan-input').value||'').trim();
  const action=document.getElementById('qr-scan-action').value;
  const qty=parseFloat(document.getElementById('qr-scan-qty').value||1);
  const res=document.getElementById('qr-scan-result');
  if(!code){res.className='qr-result err';res.textContent='กรุณาสแกนหรือพิมพ์รหัสก่อน';setTimeout(()=>res.className='qr-result',2500);return;}
  const m=masterDB.find(x=>x.code.toLowerCase()===code.toLowerCase());
  if(!m){res.className='qr-result err';res.textContent=`ไม่พบรหัส "${code}"`;setTimeout(()=>res.className='qr-result',3000);return;}
  if(action==='receive'||action==='return_good')m.stock+=qty;
  else if(action==='withdraw')m.stock=Math.max(0,m.stock-qty);
  await upsertItem(m);
  const pg=m.pg;
  const rec={time:tnow(),_ts:Date.now(),type:action,typeLabel:AL[action],name:'(QR สแกน)',dept:getDepts(pg)[0],item:m.name,code:m.code,qty,unit:m.unit,lotSW:'-',pg,via:'scan'};
  ST[pg].records.unshift(rec);await insertTransaction(rec);
  checkAlerts();if(currentQRPage===pg)renderHistory(pg);
  res.className='qr-result ok';res.textContent=`${AL[action]} "${m.name}" ${qty} ${m.unit}${action==='return_bad'?' [ไม่หักสต็อก]':''} · สต็อก ${m.stock} ${m.unit}`;
  document.getElementById('qr-scan-input').value='';document.getElementById('qr-scan-qty').value='1';
  buildQRList(pg);setTimeout(()=>res.className='qr-result',4000);
}

function buildDDList(pg,f){
  const l=document.getElementById(pg+'-ddl');if(!l)return;
  let h='';const filt=f.toLowerCase();
  if(pg==='raw'){
    RAW_CATS.forEach(g=>{const items=g.items.filter(i=>i.toLowerCase().includes(filt));if(items.length){h+=`<div><div class="dd-grp-label">${g.cat}</div>`;items.forEach(item=>{const m=masterDB.find(x=>x.name===item&&x.pg==='raw');const es=item.replace(/'/g,"\\'");h+=`<div class="dd-item" onclick="selItem('${pg}','${es}')"><span class="itag ${tagClsMap[g.cat]||''}">${g.cat}</span><span>${item}</span>${m?`<span class="dd-code">${m.code}</span>`:''}</div>`;});h+='</div>';}});
  } else if(pg==='matcha'){
    const items=MATCHA_ITEMS.filter(i=>i.toLowerCase().includes(filt));
    if(items.length){h+=`<div><div class="dd-grp-label">ชาบดผงมัตจะ</div>`;items.forEach(item=>{const m=masterDB.find(x=>x.name===item&&x.pg==='matcha');const es=item.replace(/'/g,"\\'");h+=`<div class="dd-item" onclick="selItem('${pg}','${es}')"><span>${item}</span>${m?`<span class="dd-code">${m.code}</span>`:''}</div>`;});h+='</div>';}
  } else if(pg==='pack'){
    Object.entries(PACK_CATS).forEach(([cat,items])=>{const filtered=items.filter(i=>i.toLowerCase().includes(filt));if(filtered.length){h+=`<div><div class="dd-grp-label">${cat}</div>`;filtered.forEach(item=>{const m=masterDB.find(x=>x.name===item&&x.pg==='pack');const es=item.replace(/'/g,"\\'");h+=`<div class="dd-item" onclick="selItem('${pg}','${es}')"><span>${item}</span>${m?`<span class="dd-code">${m.code}</span>`:''}</div>`;});h+='</div>';}});
  } else if(pg==='equip'){
    Object.entries(EQUIP_CATS).forEach(([cat,items])=>{const filtered=items.filter(i=>i.toLowerCase().includes(filt));if(filtered.length){h+=`<div><div class="dd-grp-label">${cat}</div>`;filtered.forEach(item=>{const m=masterDB.find(x=>x.name===item&&x.pg==='equip');const es=item.replace(/'/g,"\\'");h+=`<div class="dd-item" onclick="selItem('${pg}','${es}')"><span>${item}</span>${m?`<span class="dd-code">${m.code}</span>`:''}</div>`;});h+='</div>';}});
  } else {
    masterDB.filter(m=>m.pg===pg&&m.name.toLowerCase().includes(filt)).forEach(m=>{const es=m.name.replace(/'/g,"\\'");h+=`<div class="dd-item" onclick="selItem('${pg}','${es}')"><span>${m.name}</span><span class="dd-code">${m.code}</span></div>`;});
  }
  l.innerHTML=h||'<div style="padding:10px;text-align:center;font-size:12px;color:var(--ink3)">ไม่พบรายการ</div>';
}

async function submitF(pg){
  const name=(document.getElementById(pg+'-name')?.value||'').trim();
  const item=document.getElementById(pg+'-ival')?.value||document.getElementById(pg+'-idisplay')?.value?.trim()||'';
  const qty=document.getElementById(pg+'-qty')?.value||'';
  const unit=document.getElementById(pg+'-unit')?.value||'';
  const noLot=NO_LOT_PAGES.includes(pg);
  const lotSW=noLot?'-':document.getElementById(pg+'-lotsw')?.value||'-';
  const lotSP=noLot?'':document.getElementById(pg+'-lotsp')?.value||'';
  const note=document.getElementById(pg+'-note')?.value||document.getElementById(pg+'-improve')?.value||'';
  if(!name){alert('กรุณาระบุชื่อผู้ทำรายการ');return;}
  if(!item){alert('กรุณาเลือกหรือระบุรายการ');return;}
  if(!qty||parseFloat(qty)<=0){alert('กรุณาระบุจำนวน');return;}
  const deptEl=document.querySelector('#'+pg+'-dept .sel');
  if(!deptEl){alert('กรุณาเลือกแผนก');return;}
  const dept=deptEl.textContent.trim();
  const action=ST[pg].action;const q=parseFloat(qty);
  const mi=masterDB.find(m=>m.name===item);
  const code=mi?mi.code:'-';
  const rec={time:tnow(),_ts:Date.now(),type:action,typeLabel:AL[action],name,dept,item,code,qty:q,unit,lotSW,lotSP,note,pg};
  ST[pg].records.unshift(rec);
  if(mi){if(action==='receive'||action==='return_good')mi.stock+=q;else if(action==='withdraw')mi.stock=Math.max(0,mi.stock-q);await upsertItem(mi);}
  await insertTransaction(rec);
  checkAlerts();renderHistory(pg);
  const oldA=action;resetForm(pg);ST[pg].action=oldA;
  if(!noLot){const sw=document.getElementById(pg+'-lotsw');if(sw)sw.value=new Date().toISOString().split('T')[0];}
  document.getElementById('successDetail').textContent=`"${item}" (${code}) ${q} ${unit} — ${AL[action]}${action==='return_bad'?' (ไม่หักสต็อก)':''}`;
  document.getElementById('successModal').classList.add('show');
}

function renderHistory(pg){
  const tb=document.getElementById(pg+'-hbody');if(!tb)return;
  const hc=document.getElementById(pg+'-hcount');if(hc)hc.textContent=ST[pg].records.length;
  const noLot=NO_LOT_PAGES.includes(pg);
  const cols=noLot?7:8;
  if(!ST[pg].records.length){tb.innerHTML=`<tr><td colspan="${cols}"><div class="empty"><i class="ti ti-notes" aria-hidden="true"></i><div class="empty-text">ยังไม่มีรายการ</div></div></td></tr>`;return;}
  const bcls={receive:'badge-receive',withdraw:'badge-withdraw',return_good:'badge-return-good',return_bad:'badge-return-bad'};
  tb.innerHTML=ST[pg].records.slice(0,60).map(r=>`<tr${r.type==='return_bad'?' style="opacity:.75"':''}>
    <td>${r.time}</td>
    <td><span class="tbadge ${bcls[r.type]}">${r.typeLabel}</span></td>
    <td>${r.name}${r.via==='scan'||r.via==='camera'?'<span style="font-size:9px;color:var(--acc);margin-left:3px">scan</span>':''}</td>
    <td><span class="dept-pill ${DEPT_PILL[r.dept]||''}">${r.dept}</span></td>
    <td title="${r.item}">${r.item}${r.type==='return_bad'?'<span style="font-size:9px;color:var(--ink4);margin-left:3px">ไม่หักสต็อก</span>':''}</td>
    <td style="font-family:monospace;font-size:10px;color:var(--acc)">${r.code}</td>
    <td>${r.qty} ${r.unit}</td>
    ${!noLot?`<td>${r.lotSW||'-'}</td>`:''}
  </tr>`).join('');
}

function addCustomCat(){
  const name=(document.getElementById('newcat-name')?.value||'').trim();
  const pgVal=document.getElementById('newcat-pg')?.value||'';
  if(!name||!pgVal){alert('กรุณากรอกข้อมูลให้ครบ');return;}
  let pg=pgVal,subcat='';
  if(pgVal.startsWith('raw-')){pg='raw';subcat=pgVal.slice(4);}
  const codeShort=name.replace(/[^a-zA-Z0-9]/g,'').substring(0,4).toUpperCase()||`C${catIdSeq}`;
  const id='cat_'+catIdSeq++;
  if(!customCats[pg])customCats[pg]=[];
  customCats[pg].push({id,name,cat:subcat||codeShort,code:codeShort,pg,items:[]});
  if(pg==='raw'&&subcat&&!RAW_CATS.find(r=>r.cat===subcat))RAW_CATS.push({cat:subcat,label:name,items:[]});
  hideCatAddForm();document.getElementById('newcat-name').value='';renderMasterPage();
}

  const name=(document.getElementById('new-name')?.value||'').trim();

  const stock=parseFloat(document.getElementById('new-stock')?.value||0)||0;

  let pg=catVal,subcat='';
  if(catVal.startsWith('raw-')){pg='raw';subcat=catVal.slice(4);}
  else if(catVal.startsWith('matcha-custom-')){pg='matcha';subcat=catVal.slice(14);}

  else if(catVal.startsWith('equip-')){pg='equip';subcat=catVal.slice(6);}
  else if(catVal.includes('-custom-')){const p=catVal.split('-custom-');pg=p[0];subcat=p[1];}
  const code=pg==='raw'?genCodeRaw(subcat):genCode(pg);
  const id=masterDB.length+1;
  masterDB.push({id,code,name,pg,subcat,unit,stock,min,max});
  if(pg==='raw'&&subcat){const g=RAW_CATS.find(c=>c.cat===subcat);if(g&&!g.items.includes(name))g.items.push(name);}
  if(pg==='matcha'&&!MATCHA_ITEMS.includes(name))MATCHA_ITEMS.push(name);
  if(pg==='pack'&&subcat&&PACK_CATS[subcat]&&!PACK_CATS[subcat].includes(name))PACK_CATS[subcat].push(name);
  if(pg==='equip'&&subcat&&EQUIP_CATS[subcat]&&!EQUIP_CATS[subcat].includes(name))EQUIP_CATS[subcat].push(name);
  upsertItem(masterDB[masterDB.length-1]);
  checkAlerts();hideAddForm();renderMasterContent();
}

function setCatFilter(c,el){masterCatFilter=c;document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderMasterContent();}

function renderMasterContent(){
  const search=(document.getElementById('masterSearch')?.value||'').toLowerCase();
  const cat=masterCatFilter;
  const content=document.getElementById('masterContent');if(!content)return;
  function itemRowHtml(m){
    const st=stockStatus(m);
    const pct=m.max>0?Math.min(100,Math.round(m.stock/m.max*100)):0;
    const fC=st==='out'?'fill-out':st==='low'?'fill-low':'fill-ok';
    const sC=st==='out'?'si-out':st==='low'?'si-low':'si-ok';
    const sL=st==='out'?'หมด':st==='low'?'ต่ำ':'ปกติ';
    const sI=st==='out'?'ti-circle-x':st==='low'?'ti-alert-triangle':'ti-check';
    const cls=st==='out'?'out-stock':st==='low'?'low-stock':'';
    return `<div class="item-row ${cls}">
      <div class="ir-main">
        <div class="ir-name" title="${m.name}">${m.name}</div>
        <div class="ir-code">${m.code}</div>
        <div class="ir-meta">
          <span class="ir-stock"><strong>${m.stock}</strong> ${m.unit}</span>
          ${(m.min>0||m.max>0)?`<span class="ir-minmax">Min ${m.min} · Max ${m.max}</span><span class="ir-si ${sC}"><i class="ti ${sI}" style="font-size:10px" aria-hidden="true"></i> ${sL}</span>`:'<span class="ir-minmax" style="color:var(--ink4)">ยังไม่ตั้ง Min/Max</span>'}
        </div>
        ${(m.min>0||m.max>0)?`<div class="stock-bar" style="width:80px;margin-top:4px"><div class="stock-bar-fill ${fC}" style="width:${pct}%"></div></div>`:''}
      </div>
      <div class="ir-actions">
        <button class="icon-btn" onclick="editName(${m.id})" title="แก้ไขชื่อ"><i class="ti ti-pencil" aria-hidden="true"></i></button>
        <button class="icon-btn" onclick="editStock(${m.id})" title="สต็อก"><i class="ti ti-edit" aria-hidden="true"></i></button>
        <button class="icon-btn" onclick="editMinMax(${m.id})" title="Min/Max"><i class="ti ti-adjustments-horizontal" aria-hidden="true"></i></button>
        <button class="icon-btn danger" onclick="deleteMasterItem(${m.id})" title="ลบ"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </div>
    </div>`;
  }
  function renderSec(items,label){
    const filtered=items.filter(m=>{
      if(search&&!m.name.toLowerCase().includes(search)&&!m.code.toLowerCase().includes(search))return false;
      if(cat==='alert')return stockStatus(m)!=='ok'&&(m.min>0||m.max>0);
      return true;
    });
    if(!filtered.length)return'';
    return `<div class="master-section"><div class="master-section-header"><div class="master-section-title">${label} <span class="mcount">${filtered.length}</span></div></div><div class="item-list">${filtered.map(itemRowHtml).join('')}</div></div>`;
  }
  const sa=cat==='all'||cat==='alert';
  const SL={PD:'วัตถุดิบ — PD',Raw:'วัตถุดิบ — Raw',Fw:'วัตถุดิบ — Fw',LL:'วัตถุดิบ — LL'};
  let html='';
  if(sa||cat==='raw'){['PD','Raw','Fw','LL'].forEach(sub=>html+=renderSec(masterDB.filter(m=>m.pg==='raw'&&m.subcat===sub),SL[sub]));(customCats['raw']||[]).forEach(c=>html+=renderSec(masterDB.filter(m=>m.pg==='raw'&&m.subcat===c.cat),`วัตถุดิบ — ${c.name}`));}
  if(sa||cat==='matcha'){html+=renderSec(masterDB.filter(m=>m.pg==='matcha'),'ชาบดผงมัตจะ');(customCats['matcha']||[]).forEach(c=>html+=renderSec(masterDB.filter(m=>m.pg==='matcha'&&m.subcat===c.id),`มัตจะ — ${c.name}`));}
  if(sa||cat==='pack'){Object.keys(PACK_CATS).forEach(pc=>html+=renderSec(masterDB.filter(m=>m.pg==='pack'&&m.subcat===pc),`บรรจุภัณฑ์ — ${pc}`));(customCats['pack']||[]).forEach(c=>html+=renderSec(masterDB.filter(m=>m.pg==='pack'&&m.subcat===c.id),`บรรจุภัณฑ์ — ${c.name}`));}
  if(sa||cat==='packaging'){html+=renderSec(masterDB.filter(m=>m.pg==='packaging'),'Packaging');(customCats['packaging']||[]).forEach(c=>html+=renderSec(masterDB.filter(m=>m.pg==='packaging'&&m.subcat===c.id),`Packaging — ${c.name}`));}
  if(sa||cat==='equip'){Object.keys(EQUIP_CATS).forEach(ec=>html+=renderSec(masterDB.filter(m=>m.pg==='equip'&&m.subcat===ec),`อุปกรณ์ — ${ec}`));(customCats['equip']||[]).forEach(c=>html+=renderSec(masterDB.filter(m=>m.pg==='equip'&&m.subcat===c.id),`อุปกรณ์ — ${c.name}`));}
  if(sa||cat==='finish'){html+=renderSec(masterDB.filter(m=>m.pg==='finish'),'สินค้าสำเร็จรูป');(customCats['finish']||[]).forEach(c=>html+=renderSec(masterDB.filter(m=>m.pg==='finish'&&m.subcat===c.id),`สำเร็จรูป — ${c.name}`));}
  if(!html.trim())html='<div class="empty" style="padding:32px"><i class="ti ti-search" aria-hidden="true"></i><div class="empty-text">ไม่พบรายการ</div></div>';
  content.innerHTML=html;
}

/* ══ BOOT ══ */
WAREHOUSE_PAGES.forEach(pg=>renderWarehousePage(pg));
renderMasterPage();
checkAlerts();
(async()=>{
  const banner=document.createElement('div');
  banner.style.cssText='position:fixed;bottom:16px;right:16px;background:#1a1a1c;color:#fff;padding:9px 15px;border-radius:8px;font-size:12px;z-index:999;display:flex;align-items:center;gap:7px';
  banner.innerHTML='<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> กำลังโหลดข้อมูล...';
  document.body.appendChild(banner);
  const{data,error}=await sb.from('items').select('code,stock,min_stock,max_stock');
  if(!error&&data){data.forEach(row=>{const m=masterDB.find(x=>x.code===row.code);if(m){m.stock=parseFloat(row.stock)||0;m.min=parseFloat(row.min_stock)||0;m.max=parseFloat(row.max_stock)||0;}});}
  checkAlerts();banner.remove();
})();
</script>
</body>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sawanbondin — พิมพ์สติ๊กเกอร์ QR / Barcode</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1c1c1e;--ink2:#48484a;--ink3:#8e8e93;--bg:#f0f0ee;--surface:#fff;--s2:#f7f7f5;--line:#e4e4e0;--line2:#d0d0c8;--acc:#2c5282;--acc-bg:#ebf0f8;--r:7px;--rlg:11px;}
body{font-family:'SF Pro Text','Helvetica Neue',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.topbar{background:#1a1a1c;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:48px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:13px;font-weight:500}
.topbar-sub{color:#6e6e73;font-size:11px;padding-left:9px;border-left:1px solid #3a3a3c;margin-left:7px}
.print-btn{padding:7px 16px;background:var(--acc);border:none;border-radius:6px;color:#fff;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px}
.print-btn:hover{background:#1a3a6e}
.workspace{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 48px)}
.sidebar{background:var(--surface);border-right:1px solid var(--line);padding:14px;overflow-y:auto;height:calc(100vh - 48px);position:sticky;top:48px}
.sb-sec{margin-bottom:16px}
.sb-label{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px}
.search-input{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:var(--r);font-family:inherit;font-size:13px;outline:none}
.search-input:focus{border-color:var(--acc)}
.cat-pills{display:flex;gap:4px;flex-wrap:wrap}
.cat-pill{padding:3px 9px;border-radius:20px;border:1px solid var(--line);background:var(--surface);cursor:pointer;font-size:11px;font-weight:500;color:var(--ink3);transition:all .15s;white-space:nowrap}
.cat-pill:hover{border-color:var(--acc);color:var(--acc)}
.cat-pill.active{background:var(--ink);border-color:var(--ink);color:#fff}
.sel-bar{display:none;background:var(--acc-bg);border:1px solid var(--acc);border-radius:var(--r);padding:6px 10px;font-size:11px;color:var(--acc);justify-content:space-between;align-items:center;margin-bottom:6px}
.sel-bar.show{display:flex}
.sel-actions{display:flex;gap:5px;margin-bottom:7px}
.sel-btn{flex:1;padding:5px 8px;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);font-family:inherit;font-size:11px;cursor:pointer;color:var(--ink2)}
.sel-btn:hover{background:var(--s2)}
.item-list-sb{display:flex;flex-direction:column;gap:2px;max-height:300px;overflow-y:auto}
.item-entry{display:flex;align-items:center;gap:7px;padding:6px 9px;border:1px solid var(--line);border-radius:var(--r);cursor:pointer;transition:all .15s;background:var(--surface)}
.item-entry:hover{border-color:var(--line2)}
.item-entry.sel{border-color:var(--acc);background:var(--acc-bg)}
.ie-check{width:15px;height:15px;border:1.5px solid var(--line);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:transparent}
.item-entry.sel .ie-check{background:var(--acc);border-color:var(--acc);color:#fff}
.ie-info{flex:1;min-width:0}
.ie-name{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ie-code{font-size:10px;color:var(--acc);font-family:monospace}
.opt-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.opt-label{font-size:12px;color:var(--ink2)}
.opt-ctrl{display:flex;gap:4px}
.opt-btn{padding:3px 8px;border:1px solid var(--line);border-radius:5px;background:var(--surface);font-family:inherit;font-size:11px;cursor:pointer;color:var(--ink2)}
.opt-btn:hover,.opt-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
.opt-sel{padding:4px 7px;border:1px solid var(--line);border-radius:5px;font-family:inherit;font-size:11px;color:var(--ink);background:var(--surface);outline:none;cursor:pointer}
.opt-num{width:52px;padding:4px 7px;border:1px solid var(--line);border-radius:5px;font-family:inherit;font-size:12px;text-align:center;outline:none}
.opt-num:focus{border-color:var(--acc)}
.preview-area{padding:18px;overflow-y:auto;background:var(--bg)}
.preview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.preview-title{font-size:13px;font-weight:500;color:var(--ink2)}
.preview-empty{text-align:center;padding:60px 20px;color:var(--ink3)}
.preview-empty-icon{font-size:40px;display:block;margin-bottom:12px;opacity:.3}
.preview-empty-text{font-size:13px}
.sheet{background:#fff;border-radius:var(--rlg);border:1px solid var(--line);padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.sticker-grid{display:grid;gap:8px}
.cols-2{grid-template-columns:repeat(2,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-4{grid-template-columns:repeat(4,1fr)}
.cols-5{grid-template-columns:repeat(5,1fr)}
.sticker{border-radius:6px;overflow:hidden;padding:8px;display:flex;flex-direction:column;align-items:center;break-inside:avoid}
.sticker.classic{border:1px solid #ccc;background:#fff}
.sticker.modern{background:#1a1a1c}
.sticker.minimal{border:1px dashed #ccc;background:#fff}
.sticker.branded{border:2px solid #2c5282;background:#fff}
.sticker-name{font-size:9px;font-weight:600;text-align:center;line-height:1.3;margin-top:5px;overflow-wrap:break-word;word-break:break-word;width:100%}
.sticker-code{font-size:8px;font-family:monospace;text-align:center;margin-top:2px}
.sticker-brand{font-size:7px;font-weight:700;text-align:center;margin-top:3px;letter-spacing:.5px}
.sticker.classic .sticker-name,.sticker.minimal .sticker-name,.sticker.branded .sticker-name{color:#1c1c1e}
.sticker.classic .sticker-code,.sticker.minimal .sticker-code{color:#2c5282}
.sticker.branded .sticker-code,.sticker.branded .sticker-brand{color:#2c5282}
.sticker.classic .sticker-brand,.sticker.minimal .sticker-brand{color:#8e8e93}
.sticker.modern .sticker-name{color:#fff}
.sticker.modern .sticker-code{color:#8e9eb5}
.sticker.modern .sticker-brand{color:#4a7ab5}
@media print{
  .topbar,.sidebar,.preview-header{display:none!important}
  .workspace{display:block}
  .preview-area{padding:0}
  .sheet{border:none;box-shadow:none;border-radius:0;padding:8mm}
  body{background:#fff}
  .sticker{page-break-inside:avoid}
}
@media(max-width:768px){
  .workspace{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .sidebar{height:auto;position:static;border-right:none;border-bottom:1px solid var(--line)}
}
</style>
</head>
<body>
<div class="topbar">
  <div style="display:flex;align-items:center">
    <span class="topbar-title">Sawanbondin</span>
    <span class="topbar-sub">พิมพ์สติ๊กเกอร์ QR / Barcode</span>
  </div>
  <button class="print-btn" onclick="doPrint()"><i class="ti ti-printer" aria-hidden="true"></i> พิมพ์สติ๊กเกอร์</button>
</div>
<div class="workspace">
  <div class="sidebar">
    <div class="sb-sec">
      <div class="sb-label">ค้นหา</div>
      <input class="search-input" id="searchInput" placeholder="ชื่อหรือรหัส..." oninput="filterItems()">
    </div>
    <div class="sb-sec">
      <div class="sb-label">หมวดหมู่</div>
      <div class="cat-pills" id="catPills"></div>
    </div>
    <div class="sb-sec">
      <div class="sb-label">รายการ</div>
      <div class="sel-bar" id="selBar"><span id="selCount">เลือก 0 รายการ</span><span style="cursor:pointer;font-size:11px" onclick="clearAll()">ล้างทั้งหมด</span></div>
      <div class="sel-actions">
        <button class="sel-btn" onclick="selectAll()">เลือกทั้งหมด</button>
        <button class="sel-btn" onclick="clearAll()">ยกเลิกทั้งหมด</button>
      </div>
      <div id="itemListSb"></div>
    </div>
    <div class="sb-sec">
      <div class="sb-label">ตั้งค่าสติ๊กเกอร์</div>
      <div class="opt-row"><span class="opt-label">รูปแบบ</span><select class="opt-sel" id="styleOpt" onchange="renderPreview()"><option value="classic">Classic (ขาว)</option><option value="modern">Modern (ดำ)</option><option value="minimal">Minimal</option><option value="branded">Branded</option></select></div>
      <div class="opt-row"><span class="opt-label">QR Code</span><div class="opt-ctrl"><button class="opt-btn active" id="qrOn" onclick="toggle('showQR',true,'qrOn','qrOff')">แสดง</button><button class="opt-btn" id="qrOff" onclick="toggle('showQR',false,'qrOn','qrOff')">ซ่อน</button></div></div>
      <div class="opt-row"><span class="opt-label">Barcode เส้น</span><div class="opt-ctrl"><button class="opt-btn" id="bcOn" onclick="toggle('showBC',true,'bcOn','bcOff')">แสดง</button><button class="opt-btn active" id="bcOff" onclick="toggle('showBC',false,'bcOn','bcOff')">ซ่อน</button></div></div>
      <div class="opt-row"><span class="opt-label">ชื่อรายการ</span><div class="opt-ctrl"><button class="opt-btn active" id="nmOn" onclick="toggle('showName',true,'nmOn','nmOff')">แสดง</button><button class="opt-btn" id="nmOff" onclick="toggle('showName',false,'nmOn','nmOff')">ซ่อน</button></div></div>
      <div class="opt-row"><span class="opt-label">หน่วยงาน</span><div class="opt-ctrl"><button class="opt-btn active" id="brOn" onclick="toggle('showBrand',true,'brOn','brOff')">แสดง</button><button class="opt-btn" id="brOff" onclick="toggle('showBrand',false,'brOn','brOff')">ซ่อน</button></div></div>
      <div class="opt-row"><span class="opt-label">คอลัมน์</span><div class="opt-ctrl"><button class="opt-btn" id="c2" onclick="setCols(2)">2</button><button class="opt-btn active" id="c3" onclick="setCols(3)">3</button><button class="opt-btn" id="c4" onclick="setCols(4)">4</button><button class="opt-btn" id="c5" onclick="setCols(5)">5</button></div></div>
      <div class="opt-row"><span class="opt-label">ขนาด QR (px)</span><input class="opt-num" id="qrSize" type="number" value="80" min="48" max="160" step="8" onchange="renderPreview()"></div>
      <div class="opt-row"><span class="opt-label">จำนวนชุด/รายการ</span><input class="opt-num" id="copies" type="number" value="1" min="1" max="20" onchange="renderPreview()"></div>
    </div>
  </div>
  <div class="preview-area">
    <div class="preview-header"><span class="preview-title">ตัวอย่างสติ๊กเกอร์</span><span style="font-size:11px;color:var(--ink3)" id="stickerCount"></span></div>
    <div id="previewArea"><div class="preview-empty"><i class="ti ti-qrcode preview-empty-icon" aria-hidden="true"></i><div class="preview-empty-text">เลือกรายการจากแถบซ้ายเพื่อดูตัวอย่าง</div></div></div>
  </div>
</div>

let selected=new Set(),currentCat='ทั้งหมด',cols=3;
let showQR=true,showBC=false,showName=true,showBrand=true;

function init(){
  const cats=['ทั้งหมด',...new Set(CATALOG.map(i=>i.cat))];
  const container=document.getElementById('catPills');
  container.innerHTML='';
  cats.forEach(c=>{
    const el=document.createElement('div');
    el.className='cat-pill'+(c===currentCat?' active':'');
    el.textContent=c;
    el.addEventListener('click',function(){
      currentCat=c;
      document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
      this.classList.add('active');
      filterItems();
    });
    container.appendChild(el);
  });
  filterItems();
}
function setCat(c,el){currentCat=c;document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');filterItems();}
function filterItems(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const items=CATALOG.filter(i=>(currentCat==='ทั้งหมด'||i.cat===currentCat)&&(!q||i.name.toLowerCase().includes(q)||i.code.toLowerCase().includes(q)));
  const container=document.getElementById('itemListSb');
  const wrapper=document.createElement('div');
  wrapper.className='item-list-sb';
  items.forEach(it=>{
    const row=document.createElement('div');
    row.className='item-entry'+(selected.has(it.code)?' sel':'');
    row.innerHTML=`<div class="ie-check">${selected.has(it.code)?'✓':''}</div><div class="ie-info"><div class="ie-name">${it.name}</div><div class="ie-code">${it.code}</div></div>`;
    row.addEventListener('click',()=>toggleItem(it.code));
    wrapper.appendChild(row);
  });
  container.innerHTML='';
  container.appendChild(wrapper);
  updateSelBar();
}
function toggleItem(code){if(selected.has(code))selected.delete(code);else selected.add(code);filterItems();renderPreview();}
function selectAll(){const q=(document.getElementById('searchInput').value||'').toLowerCase();CATALOG.filter(i=>(currentCat==='ทั้งหมด'||i.cat===currentCat)&&(!q||i.name.toLowerCase().includes(q)||i.code.toLowerCase().includes(q))).forEach(i=>selected.add(i.code));filterItems();renderPreview();}
function clearAll(){selected.clear();filterItems();renderPreview();}
function updateSelBar(){const bar=document.getElementById('selBar');if(selected.size>0){bar.classList.add('show');document.getElementById('selCount').textContent=`เลือก ${selected.size} รายการ`;}else bar.classList.remove('show');}
function toggle(key,val,onId,offId){if(key==='showQR')showQR=val;else if(key==='showBC')showBC=val;else if(key==='showName')showName=val;else if(key==='showBrand')showBrand=val;document.getElementById(onId).classList.toggle('active',val);document.getElementById(offId).classList.toggle('active',!val);renderPreview();}
function setCols(n){cols=n;[2,3,4,5].forEach(c=>document.getElementById('c'+c).classList.toggle('active',c===n));renderPreview();}

function renderPreview(){
  const area=document.getElementById('previewArea');
  const cntEl=document.getElementById('stickerCount');
  if(!selected.size){area.innerHTML=`<div class="preview-empty"><i class="ti ti-qrcode preview-empty-icon" aria-hidden="true"></i><div class="preview-empty-text">เลือกรายการจากแถบซ้ายเพื่อดูตัวอย่าง</div></div>`;cntEl.textContent='';return;}
  const style=document.getElementById('styleOpt').value;
  const qrSz=parseInt(document.getElementById('qrSize').value)||80;
  const copies=parseInt(document.getElementById('copies').value)||1;
  const items=CATALOG.filter(i=>selected.has(i.code));
  const expanded=[];items.forEach(it=>{for(let c=0;c<copies;c++)expanded.push(it);});
  cntEl.textContent=`${expanded.length} สติ๊กเกอร์`;
  // build structure first, then generate QR/barcode after DOM is ready
  const sheet=document.createElement('div');sheet.className='sheet';
  const grid=document.createElement('div');grid.className=`sticker-grid cols-${cols}`;
  sheet.appendChild(grid);area.innerHTML='';area.appendChild(sheet);
  const isDark=style==='modern';
  const qrItems=[];
  expanded.forEach((item,idx)=>{
    const div=document.createElement('div');div.className=`sticker ${style}`;
    // QR placeholder — will render after append
    if(showQR){
      const qrWrap=document.createElement('div');
      qrWrap.id=`qr_${idx}`;
      qrWrap.style.cssText=`width:${qrSz}px;height:${qrSz}px;margin:0 auto`;
      div.appendChild(qrWrap);
      qrItems.push({id:`qr_${idx}`,code:item.code,sz:qrSz,dark:isDark?'#ffffff':'#1a1a1c',light:isDark?'#1a1a1c':'#ffffff'});
    }
    if(showBC){
      const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.id=`bc_${idx}`;
      svg.style.cssText='display:block;margin:4px auto 0;max-width:100%';
      div.appendChild(svg);
    }
    if(showName){const el=document.createElement('div');el.className='sticker-name';el.textContent=item.name;div.appendChild(el);}
    const cd=document.createElement('div');cd.className='sticker-code';cd.textContent=item.code;div.appendChild(cd);
    if(showBrand){const br=document.createElement('div');br.className='sticker-brand';br.textContent='SAWANBONDIN';div.appendChild(br);}
    grid.appendChild(div);
  });
  // render QR after all elements are in DOM
  requestAnimationFrame(()=>{
    qrItems.forEach(q=>{
      const el=document.getElementById(q.id);
      if(el){try{new QRCode(el,{text:q.code,width:q.sz,height:q.sz,colorDark:q.dark,colorLight:q.light,correctLevel:QRCode.CorrectLevel.M});}catch(e){console.warn('QR error',e);}}
    });
    if(showBC){
      expanded.forEach((item,idx)=>{
        const svg=document.getElementById('bc_'+idx);
        if(svg){
          try{
            JsBarcode(svg,item.code,{
              format:'CODE128',
              width:1.5,height:36,
              displayValue:true,
              fontSize:9,
              lineColor:isDark?'#ffffff':'#1a1a1c',
              background:isDark?'#1a1a1c':'#ffffff',
              margin:3
            });
          }catch(e){console.warn('BC error',e);}
        }
      });
    }
  });
}

function doPrint(){if(!selected.size){alert('กรุณาเลือกรายการก่อนพิมพ์');return;}window.print();}
init();

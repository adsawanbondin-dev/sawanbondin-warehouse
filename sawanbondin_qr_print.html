<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sawanbondin — พิมพ์สติ๊กเกอร์ QR / Barcode</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1c1c1e;--ink2:#48484a;--ink3:#8e8e93;--bg:#f0f0ee;--surface:#fff;--s2:#f7f7f5;--line:#e4e4e0;--line2:#d0d0c8;--acc:#2c5282;--acc-bg:#ebf0f8;--r:7px;--rlg:11px;}
body{font-family:'SF Pro Text','Helvetica Neue',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.topbar{background:#1a1a1c;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:48px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:13px;font-weight:500}
.topbar-sub{color:#6e6e73;font-size:11px;padding-left:9px;border-left:1px solid #3a3a3c;margin-left:7px}
.print-btn{padding:7px 16px;background:var(--acc);border:none;border-radius:6px;color:#fff;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px}
.print-btn:hover{background:#1a3a6e}
.workspace{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 48px)}
.sidebar{background:var(--surface);border-right:1px solid var(--line);padding:14px;overflow-y:auto;height:calc(100vh - 48px);position:sticky;top:48px}
.sb-sec{margin-bottom:16px}
.sb-label{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px}
.search-input{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:var(--r);font-family:inherit;font-size:13px;outline:none}
.search-input:focus{border-color:var(--acc)}
.tab-row{display:flex;gap:4px;margin-bottom:8px}
.tab-btn{flex:1;padding:5px 8px;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);font-family:inherit;font-size:11px;cursor:pointer;color:var(--ink3);transition:all .15s}
.tab-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
.cat-pills{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.cat-pill{padding:3px 9px;border-radius:20px;border:1px solid var(--line);background:var(--surface);cursor:pointer;font-size:11px;font-weight:500;color:var(--ink3);transition:all .15s;white-space:nowrap}
.cat-pill:hover{border-color:var(--acc);color:var(--acc)}
.cat-pill.active{background:var(--ink);border-color:var(--ink);color:#fff}
.sel-bar{display:none;background:var(--acc-bg);border:1px solid var(--acc);border-radius:var(--r);padding:6px 10px;font-size:11px;color:var(--acc);justify-content:space-between;align-items:center;margin-bottom:6px}
.sel-bar.show{display:flex}
.sel-actions{display:flex;gap:5px;margin-bottom:7px}
.sel-btn{flex:1;padding:5px 8px;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);font-family:inherit;font-size:11px;cursor:pointer;color:var(--ink2)}
.sel-btn:hover{background:var(--s2)}
.item-list-sb{display:flex;flex-direction:column;gap:2px;max-height:340px;overflow-y:auto}
.item-entry{display:flex;align-items:center;gap:7px;padding:6px 9px;border:1px solid var(--line);border-radius:var(--r);cursor:pointer;transition:all .15s;background:var(--surface)}
.item-entry:hover{border-color:var(--line2)}
.item-entry.sel{border-color:var(--acc);background:var(--acc-bg)}
.ie-check{width:15px;height:15px;border:1.5px solid var(--line);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:transparent}
.item-entry.sel .ie-check{background:var(--acc);border-color:var(--acc);color:#fff}
.ie-info{flex:1;min-width:0}
.ie-name{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ie-code{font-size:9px;color:var(--acc);font-family:monospace;margin-top:1px}
.opt-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.opt-label{font-size:12px;color:var(--ink2)}
.opt-ctrl{display:flex;gap:4px}
.opt-btn{padding:3px 8px;border:1px solid var(--line);border-radius:5px;background:var(--surface);font-family:inherit;font-size:11px;cursor:pointer;color:var(--ink2)}
.opt-btn:hover,.opt-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
.opt-sel{padding:4px 7px;border:1px solid var(--line);border-radius:5px;font-family:inherit;font-size:11px;color:var(--ink);background:var(--surface);outline:none;cursor:pointer}
.opt-num{width:52px;padding:4px 7px;border:1px solid var(--line);border-radius:5px;font-family:inherit;font-size:12px;text-align:center;outline:none}
.opt-num:focus{border-color:var(--acc)}
.preview-area{padding:18px;overflow-y:auto;background:var(--bg)}
.preview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.preview-title{font-size:13px;font-weight:500;color:var(--ink2)}
.preview-empty{text-align:center;padding:60px 20px;color:var(--ink3)}
.preview-empty-icon{font-size:40px;display:block;margin-bottom:12px;opacity:.3}
.preview-empty-text{font-size:13px}
.sheet{background:#fff;border-radius:var(--rlg);border:1px solid var(--line);padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.sticker-grid{display:grid;gap:8px}
.cols-2{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:repeat(3,1fr)}.cols-4{grid-template-columns:repeat(4,1fr)}.cols-5{grid-template-columns:repeat(5,1fr)}
.sticker{border-radius:6px;overflow:hidden;padding:8px;display:flex;flex-direction:column;align-items:center;break-inside:avoid;border:1.5px solid #888}
.sticker.classic{border:1px solid #ccc;background:#fff}.sticker.modern{background:#1a1a1c}.sticker.minimal{border:1px dashed #ccc;background:#fff}.sticker.branded{border:2px solid #2c5282;background:#fff}
.sticker-name{font-size:9px;font-weight:600;text-align:center;line-height:1.3;margin-top:5px;overflow-wrap:break-word;word-break:break-word;width:100%}
.sticker-sub{font-size:8px;text-align:center;margin-top:1px}
.sticker-code{font-size:8px;font-family:monospace;text-align:center;margin-top:2px}
.sticker-brand{font-size:7px;font-weight:700;text-align:center;margin-top:3px;letter-spacing:.5px}
.sticker.classic .sticker-name,.sticker.minimal .sticker-name,.sticker.branded .sticker-name{color:#1c1c1e}
.sticker.classic .sticker-code,.sticker.minimal .sticker-code{color:#2c5282}
.sticker.branded .sticker-code,.sticker.branded .sticker-brand,.sticker.branded .sticker-sub{color:#2c5282}
.sticker.classic .sticker-brand,.sticker.minimal .sticker-brand{color:#8e8e93}
.sticker.classic .sticker-sub,.sticker.minimal .sticker-sub{color:#8e8e93}
.sticker.modern .sticker-name{color:#fff}.sticker.modern .sticker-code{color:#8e9eb5}.sticker.modern .sticker-brand{color:#4a7ab5}.sticker.modern .sticker-sub{color:#6e8ea8}
.lot-load-btn{width:100%;padding:7px;background:var(--acc);border:none;border-radius:var(--r);color:#fff;font-family:inherit;font-size:12px;cursor:pointer;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:5px}
.lot-load-btn:hover{background:#1a3a6e}
.lot-load-btn:disabled{background:#8e8e93;cursor:not-allowed}
/* ── Log Table ── */
.log-table-wrap{background:#fff;border-radius:4px;border:1.25px solid #888;padding:5px 6px;display:flex;flex-direction:column;break-inside:avoid}
.log-table-header{margin-bottom:4px;text-align:center}
.log-table-title{font-size:10px;font-weight:600;color:#1c1c1e;line-height:1.25;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.log-table-sub{font-size:8px;color:#8e8e93;font-family:monospace;margin-top:1px}
.log-table{width:100%;border-collapse:collapse;font-size:9px;table-layout:fixed}
.log-table th{background:#ececec;padding:3px 2px;border:1px solid #999;font-weight:700;color:#1c1c1e;text-align:center;white-space:nowrap;font-size:8px;overflow:hidden;text-overflow:ellipsis}
.log-table td{border:1px solid #999;height:20px;padding:1px 3px;vertical-align:middle}
.log-table td.num-col{text-align:center;color:#c0c0c0;font-size:8px;width:14px}
.log-table tr:nth-child(even) td{background:#fafaf8}
.log-tables-grid{display:grid;gap:8px;margin-top:10px;padding-top:10px;border-top:1px dashed #ddd}
@media print{
  .topbar,.sidebar,.preview-header,.log-table-header button{display:none!important}
  .workspace{display:block}
  .preview-area{padding:0}
  .sheet{border:none;box-shadow:none;border-radius:0;padding:6mm}
  .log-tables-grid{padding:6mm 0 0;page-break-before:auto}
  body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact}
  .sticker{page-break-inside:avoid;break-inside:avoid;border:1.5px solid #000!important}
  .form-lbl{color:#000}
  .form-line{border-bottom:1px solid #000!important}
  .log-table{font-size:10px}
  .log-table-wrap{border:1.5px solid #000!important}
  .log-table th{font-size:9px;padding:5px 8px;border:1px solid #000!important;background:#e0e0e0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .log-table td{height:24px;border:1px solid #000!important}
}
@media(max-width:768px){.workspace{grid-template-columns:1fr;grid-template-rows:auto 1fr}.sidebar{height:auto;position:static;border-right:none;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>
<div class="topbar">
  <div style="display:flex;align-items:center">
    <span class="topbar-title">Sawanbondin</span>
    <span class="topbar-sub">พิมพ์สติ๊กเกอร์ QR / Barcode</span>
  </div>
  <button class="print-btn" onclick="doPrint()"><i class="ti ti-printer"></i> พิมพ์สติ๊กเกอร์</button>
</div>
<div class="workspace">
  <div class="sidebar">
    <!-- Tab: Items / Lots -->
    <div class="sb-sec">
      <div class="tab-row">
        <button class="tab-btn active" id="tab-items" onclick="switchTab('items')">รายการสินค้า</button>
        <button class="tab-btn" id="tab-lots" onclick="switchTab('lots')">Lot QR</button>
      </div>
    </div>

    <!-- Items tab -->
    <div id="items-tab">
      <div class="sb-sec">
        <div class="sb-label">ค้นหา</div>
        <input class="search-input" id="searchInput" placeholder="ชื่อหรือรหัส..." oninput="filterItems()">
      </div>
      <div class="sb-sec">
        <div class="sb-label">หมวดหมู่</div>
        <div class="cat-pills" id="catPills"></div>
      </div>
      <div class="sb-sec">
        <div class="sb-label">รายการ</div>
        <div class="sel-bar" id="selBar"><span id="selCount">เลือก 0</span><span style="cursor:pointer;font-size:11px" onclick="clearAll()">ล้าง</span></div>
        <div class="sel-actions">
          <button class="sel-btn" onclick="selectAll()">เลือกทั้งหมด</button>
          <button class="sel-btn" onclick="clearAll()">ยกเลิก</button>
        </div>
        <div id="itemListSb"></div>
      </div>
    </div>

    <!-- Lots tab -->
    <div id="lots-tab" style="display:none">
      <div class="sb-sec">
        <div class="sb-label">Lot QR (สแกนเข้า/ออก)</div>
        <button class="lot-load-btn" id="loadLotsBtn" onclick="loadLots()">
          <i class="ti ti-cloud-download"></i> โหลด Lot จากระบบ
        </button>
        <input class="search-input" id="lotSearch" placeholder="ค้นหา Lot..." oninput="filterLots()" style="margin-bottom:6px;display:none">
        <div id="lotListSb"></div>
      </div>
    </div>

    <!-- Settings -->
    <div class="sb-sec">
      <div class="sb-label">ตั้งค่าสติ๊กเกอร์</div>
      <div class="opt-row"><span class="opt-label">รูปแบบ</span><select class="opt-sel" id="styleOpt" onchange="renderPreview()"><option value="classic">Classic</option><option value="modern">Modern</option><option value="minimal">Minimal</option><option value="branded">Branded</option></select></div>
      <div class="opt-row"><span class="opt-label">QR Code</span><div class="opt-ctrl"><button class="opt-btn active" id="qrOn" onclick="toggle('showQR',true,'qrOn','qrOff')">แสดง</button><button class="opt-btn" id="qrOff" onclick="toggle('showQR',false,'qrOn','qrOff')">ซ่อน</button></div></div>
      <div class="opt-row"><span class="opt-label">Barcode เส้น</span><div class="opt-ctrl"><button class="opt-btn" id="bcOn" onclick="toggle('showBC',true,'bcOn','bcOff')">แสดง</button><button class="opt-btn active" id="bcOff" onclick="toggle('showBC',false,'bcOn','bcOff')">ซ่อน</button></div></div>
      <div class="opt-row"><span class="opt-label">ชื่อ</span><div class="opt-ctrl"><button class="opt-btn active" id="nmOn" onclick="toggle('showName',true,'nmOn','nmOff')">แสดง</button><button class="opt-btn" id="nmOff" onclick="toggle('showName',false,'nmOn','nmOff')">ซ่อน</button></div></div>
      <div class="opt-row"><span class="opt-label">หน่วยงาน</span><div class="opt-ctrl"><button class="opt-btn active" id="brOn" onclick="toggle('showBrand',true,'brOn','brOff')">แสดง</button><button class="opt-btn" id="brOff" onclick="toggle('showBrand',false,'brOn','brOff')">ซ่อน</button></div></div>
      <div class="opt-row"><span class="opt-label">คอลัมน์</span><div class="opt-ctrl"><button class="opt-btn" id="c2" onclick="setCols(2)">2</button><button class="opt-btn active" id="c3" onclick="setCols(3)">3</button><button class="opt-btn" id="c4" onclick="setCols(4)">4</button><button class="opt-btn" id="c5" onclick="setCols(5)">5</button></div></div>
      <div class="opt-row"><span class="opt-label">ขนาด QR (px)</span><input class="opt-num" id="qrSize" type="number" value="80" min="48" max="160" step="8" onchange="renderPreview()"></div>
      <div class="opt-row"><span class="opt-label">จำนวนชุด</span><input class="opt-num" id="copies" type="number" value="1" min="1" max="20" onchange="renderPreview()"></div>
      <div class="opt-row" style="border-top:1px solid var(--line);padding-top:8px;margin-top:4px">
        <span class="opt-label" style="font-weight:500">ตารางบันทึก</span>
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px">
          <input type="checkbox" id="showForm" style="width:14px;height:14px;cursor:pointer"> แสดง
        </label>
      </div>
      <div id="formOpts" style="display:none;background:var(--s2);border-radius:var(--r);padding:8px;margin-top:4px;border:1px solid var(--line)">
        <div style="font-size:10px;font-weight:600;color:var(--ink3);letter-spacing:.4px;margin-bottom:6px">ตั้งค่าตาราง</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
          <span style="font-size:12px;color:var(--ink2)">จำนวนแถว</span>
          <input type="number" id="logRows" value="15" min="5" max="50" style="width:52px;padding:3px 6px;border:1px solid var(--line);border-radius:5px;font-size:12px;text-align:center;outline:none">
        </div>
        <div style="font-size:10px;font-weight:600;color:var(--ink3);letter-spacing:.4px;margin:7px 0 5px">คอลัมน์</div>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:4px;cursor:pointer"><input type="checkbox" id="ff-date" checked> วันที่</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:4px;cursor:pointer"><input type="checkbox" id="ff-action" checked> ประเภท (รับ/เบิก/คืน)</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:4px;cursor:pointer"><input type="checkbox" id="ff-name" checked> ชื่อผู้ทำรายการ</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:4px;cursor:pointer"><input type="checkbox" id="ff-qty" checked> จำนวน</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:4px;cursor:pointer"><input type="checkbox" id="ff-balance" checked> ยอดคงเหลือ</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:4px;cursor:pointer"><input type="checkbox" id="ff-lot"> Lot SW</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer"><input type="checkbox" id="ff-note"> หมายเหตุ</label>
      </div>
    </div><!-- end sb-sec options -->
  </div><!-- end sidebar -->

  <div class="preview-area">
    <div class="preview-header"><span class="preview-title">ตัวอย่างสติ๊กเกอร์</span><span style="font-size:11px;color:var(--ink3)" id="stickerCount"></span></div>
    <div id="previewArea"><div class="preview-empty"><i class="ti ti-qrcode preview-empty-icon"></i><div class="preview-empty-text">เลือกรายการจากแถบซ้ายเพื่อดูตัวอย่าง</div></div></div>
  </div>
</div>

<script>
const SB_URL = 'https://rsmcrshvcbtcxvvhdmnk.supabase.co';
const SB_KEY = 'sb_publishable__RK27ReptMhtMdc8EdA-KQ_K4zfhMwJ';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

/* ══ CATALOG — โหลดจาก Supabase แทน hardcode ══ */
let CATALOG = [];

async function loadCatalog() {
  try {
    const { data, error } = await sb.from('items')
      .select('code,name,pg,subcat')
      .eq('is_active', true)
      .order('pg').order('subcat').order('seq');
    if (error) throw error;

    // map pg code → ชื่อภาษาไทย
    const PG_LABEL = {
      raw:'วัตถุดิบ', matcha:'ชาบดผงมัตจะ', pack:'บรรจุภัณฑ์',
      packaging:'Packaging', equip:'อุปกรณ์', finish:'สินค้าสำเร็จรูป'
    };

    CATALOG = (data||[]).map(r => ({
      code: r.code,
      name: r.name,
      cat:  PG_LABEL[r.pg] || r.pg,
      sub:  r.subcat || '',
    }));
  } catch(e) {
    console.error('loadCatalog error:', e);
  }
}


/* ══ STATE ══ */
let selected=new Set(), lotSelected=new Set();
let currentCat='ทั้งหมด', currentTab='items';
let cols=3, showQR=true, showBC=false, showName=true, showBrand=true;
let lotCatalog=[];

/* ══ TABS ══ */
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-items').classList.toggle('active',tab==='items');
  document.getElementById('tab-lots').classList.toggle('active',tab==='lots');
  document.getElementById('items-tab').style.display=tab==='items'?'block':'none';
  document.getElementById('lots-tab').style.display=tab==='lots'?'block':'none';
  renderPreview();
}

/* ══ LOTS ══ */
async function loadLots(){
  const btn=document.getElementById('loadLotsBtn');
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> กำลังโหลด...';
  try{
    const{data,error}=await sb.from('lots').select('id,item_code,item_name,lot_sw,lot_supplier,stock,qr_payload').gt('stock',0).order('item_code').order('lot_sw');
    if(error)throw error;
    lotCatalog=data.map(r=>({
      id:r.id,
      name:r.item_name,
      lotSW:r.lot_sw||'',
      lotSP:r.lot_supplier||'',
      stock:parseFloat(r.stock)||0,
      code:r.qr_payload||(r.item_code+'__LOT__'+r.lot_sw),
      itemCode:r.item_code,
      cat:'Lot',
    }));
    btn.innerHTML=`<i class="ti ti-check"></i> โหลดแล้ว ${lotCatalog.length} Lot`;
    document.getElementById('lotSearch').style.display='block';
    filterLots();
  }catch(e){
    btn.innerHTML='<i class="ti ti-alert-circle"></i> โหลดไม่สำเร็จ — ลองใหม่';
    btn.disabled=false;
  }
}

function filterLots(){
  const q=(document.getElementById('lotSearch').value||'').toLowerCase();
  const items=lotCatalog.filter(l=>!q||l.name.toLowerCase().includes(q)||l.lotSW.includes(q)||l.itemCode.toLowerCase().includes(q));
  const container=document.getElementById('lotListSb');
  container.innerHTML='';
  if(!items.length){container.innerHTML='<div style="font-size:12px;color:var(--ink3);padding:8px">ไม่พบ Lot</div>';return;}
  const wrap=document.createElement('div');wrap.className='item-list-sb';
  items.forEach(it=>{
    const row=document.createElement('div');
    row.className='item-entry'+(lotSelected.has(it.code)?' sel':'');
    const swStr=it.lotSW?new Date(it.lotSW).toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'2-digit'}):'?';
    const spStr=it.lotSP?new Date(it.lotSP).toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'2-digit'}):'';
    row.innerHTML=`<div class="ie-check">${lotSelected.has(it.code)?'✓':''}</div>
      <div class="ie-info">
        <div class="ie-name">${it.name}</div>
        <div class="ie-code">SW: ${swStr}${spStr?' · Sup: '+spStr:''} · คงเหลือ ${it.stock}</div>
      </div>`;
    row.addEventListener('click',()=>{
      if(lotSelected.has(it.code))lotSelected.delete(it.code);
      else lotSelected.add(it.code);
      filterLots(); renderPreview();
    });
    wrap.appendChild(row);
  });
  container.appendChild(wrap);
}

/* ══ ITEMS ══ */
async function init(){
  // แสดง loading state
  document.getElementById('catPills').innerHTML = '<span style="font-size:11px;color:var(--ink3)">กำลังโหลด...</span>';
  document.getElementById('itemListSb').innerHTML = '<div style="padding:10px;font-size:12px;color:var(--ink3);text-align:center"><i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> โหลดรายการ...</div>';

  await loadCatalog();

  // สร้าง cat pills จากข้อมูลจริง
  const cats=['ทั้งหมด',...new Set(CATALOG.map(i=>i.cat))];
  const container=document.getElementById('catPills');
  container.innerHTML='';
  cats.forEach(c=>{
    const el=document.createElement('div');
    el.className='cat-pill'+(c===currentCat?' active':'');
    el.textContent=c;
    el.addEventListener('click',function(){
      currentCat=c;
      document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
      this.classList.add('active');
      filterItems();
    });
    container.appendChild(el);
  });
  filterItems();
  bindFormControls();
}
function filterItems(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const items=CATALOG.filter(i=>(currentCat==='ทั้งหมด'||i.cat===currentCat)&&(!q||i.name.toLowerCase().includes(q)||i.code.toLowerCase().includes(q)));
  const container=document.getElementById('itemListSb');
  const wrap=document.createElement('div');wrap.className='item-list-sb';
  items.forEach(it=>{
    const row=document.createElement('div');
    row.className='item-entry'+(selected.has(it.code)?' sel':'');
    row.innerHTML=`<div class="ie-check">${selected.has(it.code)?'✓':''}</div>
      <div class="ie-info"><div class="ie-name">${it.name}</div><div class="ie-code">${it.code}</div></div>`;
    row.addEventListener('click',()=>{
      if(selected.has(it.code))selected.delete(it.code);
      else selected.add(it.code);
      filterItems(); updateSelBar(); renderPreview();
    });
    wrap.appendChild(row);
  });
  container.innerHTML='';container.appendChild(wrap);
  updateSelBar();
}
function selectAll(){const q=(document.getElementById('searchInput').value||'').toLowerCase();CATALOG.filter(i=>(currentCat==='ทั้งหมด'||i.cat===currentCat)&&(!q||i.name.toLowerCase().includes(q)||i.code.toLowerCase().includes(q))).forEach(i=>selected.add(i.code));filterItems();renderPreview();}
function clearAll(){selected.clear();filterItems();renderPreview();}
function updateSelBar(){const bar=document.getElementById('selBar');if(selected.size>0){bar.classList.add('show');document.getElementById('selCount').textContent=`เลือก ${selected.size}`;}else bar.classList.remove('show');}
function toggle(key,val,onId,offId){if(key==='showQR')showQR=val;else if(key==='showBC')showBC=val;else if(key==='showName')showName=val;else if(key==='showBrand')showBrand=val;document.getElementById(onId).classList.toggle('active',val);document.getElementById(offId).classList.toggle('active',!val);renderPreview();}
function setCols(n){cols=n;[2,3,4,5].forEach(c=>document.getElementById('c'+c).classList.toggle('active',c===n));renderPreview();}

/* ══ RENDER ══ */
function renderPreview(){
  // รวม items และ lots ที่เลือก
  const itemsList = CATALOG.filter(i=>selected.has(i.code)).map(i=>({...i,type:'item'}));
  const lotsList  = lotCatalog.filter(l=>lotSelected.has(l.code)).map(l=>({...l,type:'lot'}));
  const allItems  = [...itemsList,...lotsList];

  const area=document.getElementById('previewArea');
  const cntEl=document.getElementById('stickerCount');
  if(!allItems.length){
    area.innerHTML=`<div class="preview-empty"><i class="ti ti-qrcode preview-empty-icon"></i><div class="preview-empty-text">เลือกรายการหรือ Lot จากแถบซ้ายเพื่อดูตัวอย่าง</div></div>`;
    cntEl.textContent='';return;
  }
  const style=document.getElementById('styleOpt').value;
  const qrSz=parseInt(document.getElementById('qrSize').value)||80;
  const copies=parseInt(document.getElementById('copies').value)||1;
  const expanded=[];allItems.forEach(it=>{for(let c=0;c<copies;c++)expanded.push(it);});
  cntEl.textContent=`${expanded.length} สติ๊กเกอร์`;
  area.innerHTML=`<div class="sheet"><div class="sticker-grid cols-${cols}" id="grid"></div></div>`;
  const grid=document.getElementById('grid');
  const isDark=style==='modern';
  const qrItems=[];
  expanded.forEach((item,idx)=>{
    const div=document.createElement('div');div.className=`sticker ${style}`;
    if(showQR){
      const qrWrap=document.createElement('div');qrWrap.id=`qr_${idx}`;
      qrWrap.style.cssText=`width:${qrSz}px;height:${qrSz}px;margin:0 auto`;
      div.appendChild(qrWrap);
      qrItems.push({id:`qr_${idx}`,code:item.code,sz:qrSz,dark:isDark?'#ffffff':'#1a1a1c',light:isDark?'#1a1a1c':'#ffffff'});
    }
    if(showBC){
      const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.id=`bc_${idx}`;svg.style.cssText='display:block;margin:4px auto 0;max-width:100%';
      div.appendChild(svg);
    }
    if(showName){
      const el=document.createElement('div');el.className='sticker-name';
      el.textContent=item.name;div.appendChild(el);
    }
    // Lot sub-info
    if(item.type==='lot'&&item.lotSW){
      const li=document.createElement('div');li.className='sticker-sub';
      const swStr=new Date(item.lotSW).toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'2-digit'});
      li.textContent='Lot: '+swStr+(item.lotSP?' | Sup: '+new Date(item.lotSP).toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'2-digit'}):'');
      div.appendChild(li);
    }
    const cd=document.createElement('div');cd.className='sticker-code';
    // แสดง item code เท่านั้น (ไม่รวม __LOT__ part)
    cd.textContent=item.itemCode||item.code.split('__LOT__')[0];
    div.appendChild(cd);
    if(showBrand){const br=document.createElement('div');br.className='sticker-brand';br.textContent='SAWANBONDIN';div.appendChild(br);}

    grid.appendChild(div);
  });
  requestAnimationFrame(()=>{
    qrItems.forEach(q=>{
      const el=document.getElementById(q.id);
      if(el){try{new QRCode(el,{text:q.code,width:q.sz,height:q.sz,colorDark:q.dark,colorLight:q.light,correctLevel:QRCode.CorrectLevel.M});}catch(e){}}
    });
    if(showBC){
      expanded.forEach((item,idx)=>{
        const svg=document.getElementById('bc_'+idx);
        if(svg){try{JsBarcode(svg,item.itemCode||item.code.split('__LOT__')[0],{format:'CODE128',width:1.5,height:36,displayValue:true,fontSize:9,lineColor:isDark?'#fff':'#1a1a1c',background:isDark?'#1a1a1c':'#fff',margin:3});}catch(e){}}
      });
    }
    renderLogTable();
  });
}

function renderLogTable(){
  const sheet = document.querySelector('.sheet');
  const showForm = document.getElementById('showForm')?.checked;
  if(!sheet) return;
  if(!showForm){
    const existing = document.getElementById('logTableWrap');
    if(existing) existing.remove();
    return;
  }
  const logCols = [];
  if(document.getElementById('ff-date')?.checked)    logCols.push({key:'date',  label:'วันที่'});
  if(document.getElementById('ff-action')?.checked)  logCols.push({key:'action',label:'ประเภท'});
  if(document.getElementById('ff-name')?.checked)    logCols.push({key:'name',  label:'ชื่อ'});
  if(document.getElementById('ff-qty')?.checked)     logCols.push({key:'qty',   label:'จำนวน'});
  if(document.getElementById('ff-balance')?.checked) logCols.push({key:'bal',   label:'คงเหลือ'});
  if(document.getElementById('ff-lot')?.checked)     logCols.push({key:'lot',   label:'Lot'});
  if(document.getElementById('ff-note')?.checked)    logCols.push({key:'note',  label:'หมายเหตุ'});
  if(!logCols.length) return;

  const numRows = parseInt(document.getElementById('logRows')?.value)||15;
  const copies  = parseInt(document.getElementById('copies')?.value)||1;
  // รายการที่เลือก
  const itemsList = CATALOG.filter(i=>selected.has(i.code));
  const lotsList  = lotCatalog.filter(l=>lotSelected.has(l.code));
  const allItems  = [...itemsList,...lotsList];

  let existing = document.getElementById('logTableWrap');
  if(!existing){
    existing = document.createElement('div');
    existing.id = 'logTableWrap';
    sheet.appendChild(existing);
  }

  // ใช้ grid columns เดียวกับ sticker grid เพื่อให้ความกว้างตารางตรงกับ 1 sticker
  const stickerCols = cols; // global variable, 2-5, set via setCols()

  let html2 = '';
  if(!allItems.length){
    for(let c=0;c<copies;c++) html2 += buildLogTableHTML('บันทึกรายการรับ-เบิก-คืน',logCols,numRows);
  } else {
    allItems.forEach(item=>{
      const swStr = item.lotSW ? new Date(item.lotSW).toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'2-digit'}) : '';
      const subTitle = item.type==='lot' ? `Lot ${swStr} · เหลือ ${item.stock}` : item.code;
      for(let c=0;c<copies;c++) html2 += buildLogTableHTML(item.name, logCols, numRows, subTitle);
    });
  }
  existing.innerHTML = `<div class="log-tables-grid cols-${stickerCols}">${html2}</div>`;
}

function buildLogTableHTML(title, cols, numRows, subtitle=''){
  const thCols = cols.map(c=>`<th>${c.label}</th>`).join('');
  return `<div class="log-table-wrap">
    <div class="log-table-header">
      <div class="log-table-title" title="${title}">${title}</div>
      ${subtitle?`<div class="log-table-sub">${subtitle}</div>`:''}
    </div>
    <table class="log-table">
      <thead><tr><th style="width:14px">#</th>${thCols}</tr></thead>
      <tbody>${Array.from({length:numRows},(_,i)=>`<tr><td class="num-col">${i+1}</td>${cols.map(()=>'<td></td>').join('')}</tr>`).join('')}</tbody>
    </table>
  </div>`;
}

// bind form controls หลัง DOM พร้อม
function bindFormControls(){
  const sf = document.getElementById('showForm');
  if(sf) sf.addEventListener('change', function(){
    document.getElementById('formOpts').style.display = this.checked ? 'block' : 'none';
    renderPreview();
    renderLogTable();
  });
  ['ff-date','ff-action','ff-name','ff-qty','ff-balance','ff-lot','ff-note','logRows'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.addEventListener('change', ()=>{ renderPreview(); renderLogTable(); });
  });
}

function doPrint(){if(!selected.size&&!lotSelected.size){alert('กรุณาเลือกรายการหรือ Lot ก่อนพิมพ์');return;}window.print();}

// CSS animation for loader
const style=document.createElement('style');
style.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
document.head.appendChild(style);

init();
</script>

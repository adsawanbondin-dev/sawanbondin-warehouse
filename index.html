<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#101012">
<title>Sawanbondin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'SF Pro Text','Helvetica Neue',system-ui,sans-serif;
  background:#101012;color:#f4f4f3;
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
}
.brand{
  padding:28px 28px 0;
  font-size:12px;font-weight:500;letter-spacing:.4px;
  color:#6b6b6e;
}
.stage{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;
}
.lead{
  font-size:13px;color:#6b6b6e;
  margin-bottom:18px;text-align:center;
}
.split{
  display:flex;align-items:stretch;justify-content:center;
  width:100%;max-width:780px;
}
.choice{
  flex:1;
  text-decoration:none;color:#f4f4f3;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:48px 28px;
  position:relative;
}
.choice .name{
  font-size:clamp(28px,5.2vw,42px);
  font-weight:600;letter-spacing:-.5px;
  transition:opacity .2s ease, transform .2s ease;
}
.choice .tag{
  font-size:11.5px;color:#7c7c80;
  letter-spacing:.2px;
  transition:color .2s ease;
}
.choice:hover .name{transform:translateY(-1px)}
.choice:hover .tag{color:#a8a8ac}
.divider{
  width:1px;background:linear-gradient(180deg,transparent,#2b2b2e 18%,#2b2b2e 82%,transparent);
  flex-shrink:0;
}
.choice::after{
  content:'';
  position:absolute;left:50%;bottom:30px;
  width:0;height:1px;background:#f4f4f3;
  transform:translateX(-50%);
  transition:width .22s ease;
}
.choice:hover::after{width:36px}
@media(max-width:600px){
  .split{flex-direction:column;max-width:340px}
  .divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,#2b2b2e 18%,#2b2b2e 82%,transparent)}
  .choice{padding:36px 20px}
  .choice::after{bottom:14px}
}
footer{
  padding:20px 28px 28px;
  text-align:center;
  font-size:10.5px;color:#46464a;
  letter-spacing:.3px;
}
</style>
</head>
<body>
<div class="brand">SAWANBONDIN</div>

<div class="stage">
  <div class="lead">เลือกระบบที่ต้องการเข้าใช้งาน</div>
  <div class="split">
    <a class="choice" href="factory/">
      <div class="name">Factory</div>
      <div class="tag">คลังโรงงาน — วัตถุดิบ &amp; การผลิต</div>
    </a>
    <div class="divider"></div>
    <a class="choice" href="teahouse/">
      <div class="name">Tea House</div>
      <div class="tag">คลังหน้าร้าน — สินค้า &amp; บรรจุภัณฑ์</div>
    </a>
  </div>
</div>

<footer>ข้อมูลแยกจากกันโดยสมบูรณ์</footer>
</body>
<!-- deploy -->
</html>

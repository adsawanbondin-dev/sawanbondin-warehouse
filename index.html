<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1c1c1e">
<title>Sawanbondin — เลือกระบบ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1c1c1e;--ink2:#48484a;--ink3:#8e8e93;
  --bg:#f0f0ee;--surface:#fff;--line:#e4e4e0;
  --acc:#2c5282;--acc-bg:#ebf0f8;
  --grn:#2d6a4f;--grn-bg:#edf5f0;
}
body{
  font-family:'SF Pro Text','Helvetica Neue',system-ui,sans-serif;
  background:var(--bg);color:var(--ink);
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
.wrap{width:100%;max-width:760px}
.eyebrow{
  font-size:11px;font-weight:600;color:var(--ink3);
  text-transform:uppercase;letter-spacing:1.2px;
  text-align:center;margin-bottom:10px;
}
h1{
  font-size:26px;font-weight:600;text-align:center;
  margin-bottom:6px;letter-spacing:-.2px;
}
.sub{
  font-size:13px;color:var(--ink3);text-align:center;
  margin-bottom:36px;
}
.choices{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;
}
@media(max-width:560px){
  .choices{grid-template-columns:1fr}
  h1{font-size:22px}
}
.card{
  background:var(--surface);border:1px solid var(--line);
  border-radius:16px;padding:28px 22px;
  text-decoration:none;color:inherit;
  box-shadow:0 1px 2px rgba(0,0,0,.03);
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  display:flex;flex-direction:column;gap:14px;
  min-height:188px;
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 28px rgba(0,0,0,.08);
}
.card:active{transform:translateY(0)}
.card-factory:hover{border-color:#b9c9dd}
.card-teahouse:hover{border-color:#bcd8c8}
.icon{
  width:44px;height:44px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:21px;
}
.card-factory .icon{background:var(--acc-bg);color:var(--acc)}
.card-teahouse .icon{background:var(--grn-bg);color:var(--grn)}
.card-body{flex:1}
.card-title{font-size:16px;font-weight:600;margin-bottom:4px}
.card-desc{font-size:12.5px;color:var(--ink3);line-height:1.5}
.card-foot{
  display:flex;align-items:center;gap:5px;
  font-size:12px;font-weight:500;
}
.card-factory .card-foot{color:var(--acc)}
.card-teahouse .card-foot{color:var(--grn)}
.card-foot svg{transition:transform .18s ease}
.card:hover .card-foot svg{transform:translateX(3px)}
footer{
  margin-top:40px;font-size:11px;color:var(--ink3);text-align:center;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Sawanbondin Warehouse</div>
  <h1>เลือกระบบที่ต้องการเข้าใช้งาน</h1>
  <div class="sub">ระบบจัดการคลัง — แยกข้อมูลกันคนละชุดตามหน่วยงาน</div>

  <div class="choices">
    <a class="card card-factory" href="factory/">
      <div class="icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20"/><path d="M4 20V10l5 3v-3l5 3V8l5 3v9"/><path d="M4 20V8l4-4 4 4v3"/></svg>
      </div>
      <div class="card-body">
        <div class="card-title">Factory</div>
        <div class="card-desc">คลังวัตถุดิบ การผลิต และสินค้าสำเร็จรูปของโรงงาน</div>
      </div>
      <div class="card-foot">
        เข้าสู่ระบบ
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </div>
    </a>

    <a class="card card-teahouse" href="teahouse/">
      <div class="icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h14a2 2 0 0 1 2 2v1a4 4 0 0 1-4 4h-1"/><path d="M3 8v8a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3v-2"/><path d="M6 2v2"/><path d="M10 2v2"/><path d="M14 2v2"/></svg>
      </div>
      <div class="card-body">
        <div class="card-title">Tea House</div>
        <div class="card-desc">คลังสินค้าและบรรจุภัณฑ์ของหน้าร้าน Tea House</div>
      </div>
      <div class="card-foot">
        เข้าสู่ระบบ
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </div>
    </a>
  </div>

  <footer>ข้อมูลของแต่ละระบบแยกจากกันโดยสมบูรณ์</footer>
</div>
</body>
</html>
